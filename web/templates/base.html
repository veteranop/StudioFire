<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ station }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand" title="{{ station }}">
      <img src="/static/sf_logo.png" alt="{{ station }}" class="brand-logo">
    </a>
    {% block nav %}{% endblock %}
    <div class="clock" id="topclock">--:--:--</div>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const el = document.getElementById("topclock");
      function tick() {
        const d = new Date();
        el.textContent = d.toLocaleTimeString([], {hour12: false});
      }
      tick(); setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
